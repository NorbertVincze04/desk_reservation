<app-shadow-box>
  <div class="top-bar">
    <h5 *ngIf="bookedDesk; else sel">
      You already booked {{ bookedDesk }} on
      {{ currentDate | date: "shortDate" }}
    </h5>
    <ng-template #sel>
      <h5 *ngIf="currentDesk; else none">
        Current booking - {{ currentDesk }}
        <span *ngIf="currentDate"
          >on {{ currentDate | date: "shortDate" }}</span
        >
      </h5>
      <ng-template #none>
        <h5>Current booking - No desk booked</h5>
      </ng-template>
    </ng-template>

    <div class="right">
      <app-action-button
        [config]="getButtonConfig()"
        [isLoading]="isLoading"
        (action)="bookNow()"
      ></app-action-button>
      <a routerLink="/info"
        ><i class="fas fa-info fa-lg" style="color: #000000"></i
      ></a>
    </div>

    <app-error-notification
      [config]="errorConfig"
      [visible]="!!errorMessage"
      [ngStyle]="{ position: 'absolute', right: '175px' }"
    ></app-error-notification>
  </div>
</app-shadow-box>
