<table>
  <tr>
    <th>User Name</th>
    <th>Desk Name</th>
  </tr>

  <ng-container *ngIf="bookings.length > 0; else empty">
    <tr *ngFor="let b of bookings">
      <td>{{ b.user }}</td>
      <td>{{ b.deskId }}</td>
    </tr>
  </ng-container>

  <ng-template #empty>
    <td colspan="2" class="no-bookings">No registrations yet</td>
  </ng-template>
</table>
