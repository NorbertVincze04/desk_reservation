<form>
  <p-datepicker
    name="date"
    [(ngModel)]="selectedDate"
    [minDate]="minDate"
    [disabledDays]="disabledDays"
    [readonlyInput]="true"
    [inline]="true"
    (ngModelChange)="onDateChange($event)"
  />

  <div *ngIf="warningMessage" class="message-box warning">
    <i class="pi pi-exclamation-triangle"></i>
    <span>{{ warningMessage }}</span>
  </div>
</form>
