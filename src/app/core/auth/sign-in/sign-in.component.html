<app-main-div>
  <app-shadow-box>
    <h2>Sign In</h2>
    <form [formGroup]="signInForm" (ngSubmit)="onSignIn()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          class="form-control"
          type="email"
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-container">
          <input
            id="password"
            [type]="passwordVisible ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            class="form-control"
          />
          <button
            type="button"
            class="visibility-toggle"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            <i
              [class]="passwordVisible ? 'fas fa-eye-slash' : 'fas fa-eye'"
            ></i>
          </button>
        </div>
      </div>
      <button type="submit" class="form-submit" [disabled]="signInForm.invalid">
        Sign In
      </button>
      <div *ngIf="loginError" class="form-error">{{ loginError }}</div>
    </form>
    <div class="form-links">
      <a (click)="onForgotPassword()" class="forgot-link">Forgot password?</a>
      <a (click)="onRegister()" class="register-link">Not registered yet?</a>
    </div>
  </app-shadow-box>
</app-main-div>
