<form>
  <p-datepicker
    name="date"
    [(ngModel)]="selectedDate"
    [minDate]="minDate"
    [disabledDays]="disabledDays"
    [readonlyInput]="true"
    [inline]="true"
    (ngModelChange)="onDateChange($event)"
  />

  <app-error-notification
    [config]="validationError"
    [visible]="!!warningMessage"
  ></app-error-notification>
</form>
